name: Block Internal PRs

on:
  pull_request:
    types: [opened, reopened]

permissions: {}

jobs:
  block-internal-prs:
    name: Block Internal PRs
    # Only block same-repo PRs to the default branch. Integration branch PRs/MRs
    # are handled by the Gas Town merge queue and must not get default-branch advice.
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.base.ref == github.event.repository.default_branch &&
      github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Close PR and comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const prNumber = context.issue.number;
            const branch = context.payload.pull_request.head.ref;
            const baseBranch = context.payload.pull_request.base.ref;

            const body = [
              '**Internal PRs to the default branch are not allowed.**',
              '',
              'Gas Town agents must use the configured merge workflow for internal work.',
              '',
              'Polecats: run `gt done` so Refinery merges `' + branch + '` to the configured target branch.',
              'Crew/maintainers: follow the current role workflow instead of opening an internal PR to `' + baseBranch + '`.',
              '',
              'Integration branch work should flow through the merge queue target, not direct default-branch PRs or pushes.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: 'closed'
            });

            core.setFailed('Internal PR blocked. Use the configured Gas Town merge workflow.');
